<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zara - The Urban Plate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }

      :root {
        --surface: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.45);
        --text-main: #1f1a2b;
        --text-muted: #f4eefe;
        --accent-a: #7c3aed;
        --accent-b: #ec4899;
        --chip-bg: rgba(255, 255, 255, 0.6);
        --form-bg: rgba(255, 255, 255, 0.48);
      }

      body.dark {
        --surface: rgba(17, 17, 32, 0.7);
        --glass-border: rgba(255, 255, 255, 0.13);
        --text-main: #eee8ff;
        --chip-bg: rgba(255, 255, 255, 0.08);
        --form-bg: rgba(24, 24, 42, 0.58);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text-main);
        font-family: "Plus Jakarta Sans", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.16), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.14), transparent 35%),
          linear-gradient(120deg, #f8f5ff, #fff1f8);
        position: relative;
        transition: background 220ms ease, color 220ms ease;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(236, 72, 153, 0.05) 1px, transparent 1px);
        background-size: 36px 36px;
      }

      body.dark {
        background:
          radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.22), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.18), transparent 35%),
          linear-gradient(120deg, #141327, #1d1330);
      }

      .chat-shell {
        width: min(720px, 92vw);
        background: var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 55px rgba(88, 44, 142, 0.2);
        overflow: hidden;
        position: relative;
        z-index: 1;
      }

      .chat-header {
        padding: 18px 22px;
        background: linear-gradient(115deg, var(--accent-a), var(--accent-b));
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .header-text {
        min-width: 0;
      }

      .chat-header h1 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: 0.2px;
      }

      .chat-header p {
        margin: 6px 0 0;
        color: var(--text-muted);
        font-size: 0.92rem;
      }

      .chat-window {
        height: 420px;
        padding: 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        max-width: 80%;
        padding: 11px 14px;
        border-radius: 14px;
        line-height: 1.45;
        font-size: 0.95rem;
        border: 1px solid rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(61, 29, 90, 0.09);
        animation: slideFade 280ms ease;
      }

      .message.user {
        align-self: flex-end;
        background: linear-gradient(130deg, rgba(124, 58, 237, 0.25), rgba(236, 72, 153, 0.25));
      }

      .message.bot {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.68);
      }

      body.dark .message.bot {
        background: rgba(255, 255, 255, 0.1);
      }

      .message-content {
        white-space: pre-wrap;
      }

      .message-time {
        margin-top: 6px;
        font-size: 0.72rem;
        opacity: 0.66;
      }

      .typing {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-width: 46px;
      }

      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(91, 33, 182, 0.75);
        animation: blink 1.2s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.14s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.28s;
      }

      .chat-form {
        display: flex;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.55);
        background: var(--form-bg);
      }

      .suggestions {
        padding: 0 14px 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid rgba(124, 58, 237, 0.22);
        background: var(--chip-bg);
        color: var(--text-main);
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 0.82rem;
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }

      .chip:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 15px rgba(124, 58, 237, 0.16);
      }

      .theme-toggle {
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 0.82rem;
        cursor: pointer;
      }

      .chat-form input {
        flex: 1;
        border: 1px solid rgba(124, 58, 237, 0.25);
        border-radius: 12px;
        padding: 11px 13px;
        font-size: 0.95rem;
        outline: none;
        background: rgba(255, 255, 255, 0.88);
      }

      .chat-form input:focus {
        border-color: rgba(124, 58, 237, 0.52);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
      }

      .chat-form button {
        border: none;
        border-radius: 12px;
        background: linear-gradient(115deg, var(--accent-a), var(--accent-b));
        color: #fff;
        padding: 0 18px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 170ms ease, box-shadow 170ms ease, filter 170ms ease;
      }

      .chat-form button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(124, 58, 237, 0.32);
        filter: saturate(1.08);
      }

      .chat-form button:active {
        transform: translateY(0);
      }

      .chat-form button:disabled {
        opacity: 0.72;
        cursor: not-allowed;
      }

      @keyframes slideFade {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes blink {
        0%, 80%, 100% {
          transform: scale(0.72);
          opacity: 0.45;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="chat-shell">
      <header class="chat-header">
        <div class="header-text">
          <h1>Zara</h1>
          <p>The Urban Plate Cafe Assistant</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button">Dark mode</button>
      </header>

      <section id="chatWindow" class="chat-window" aria-live="polite"></section>
      <section class="suggestions">
        <button class="chip" type="button">Today's best recommendations</button>
        <button class="chip" type="button">Cafe timings</button>
        <button class="chip" type="button">Book a table for 2</button>
        <button class="chip" type="button">Popular snacks under Rs. 300</button>
      </section>

      <form id="chatForm" class="chat-form">
        <input
          id="messageInput"
          type="text"
          placeholder="Ask about menu, timings, reservations..."
          autocomplete="off"
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>

    <script>
      const GROQ_API_KEY = "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";
      const SYSTEM_PROMPT = `You are Zara, a helpful assistant for The Urban Plate cafe.

Answer using only this information. Do not invent other locations, hours, prices, or dishes.

Cafe name: The Urban Plate
Location: Ahmedabad
Timings: 8am to 11pm

Menu:
- Cold Coffee — ₹120
- Pasta — ₹180
- Sandwich — ₹150
- Cheesecake — ₹200
- Signature desserts (today's picks; do not invent dessert names or extra prices)

Help with menu, timings, reservations and recommendations from this data. For bookings, ask party size, date/time, and contact details in a friendly way.

Keep responses short and friendly.`;

      const chatWindow = document.getElementById("chatWindow");
      const chatForm = document.getElementById("chatForm");
      const messageInput = document.getElementById("messageInput");
      const sendButton = chatForm.querySelector("button");
      const chips = document.querySelectorAll(".chip");
      const themeToggle = document.getElementById("themeToggle");

      const conversation = [];
      let typingBubble = null;

      function currentTime() {
        return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function addMessage(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `message ${role === "user" ? "user" : "bot"}`;
        const content = document.createElement("div");
        content.className = "message-content";
        content.textContent = text;
        const time = document.createElement("div");
        time.className = "message-time";
        time.textContent = currentTime();
        bubble.append(content, time);
        chatWindow.appendChild(bubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function showTyping() {
        typingBubble = document.createElement("div");
        typingBubble.className = "message bot";
        typingBubble.innerHTML =
          '<div class="typing"><span></span><span></span><span></span></div>';
        chatWindow.appendChild(typingBubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function hideTyping() {
        if (typingBubble) {
          typingBubble.remove();
          typingBubble = null;
        }
      }

      function applyTheme(theme) {
        const dark = theme === "dark";
        document.body.classList.toggle("dark", dark);
        themeToggle.textContent = dark ? "Light mode" : "Dark mode";
        localStorage.setItem("zara-theme", dark ? "dark" : "light");
      }

      const storedTheme = localStorage.getItem("zara-theme") || "light";
      applyTheme(storedTheme);
      themeToggle.addEventListener("click", () => {
        const dark = document.body.classList.contains("dark");
        applyTheme(dark ? "light" : "dark");
      });

      addMessage("assistant", "Hi! I am Zara. How can I help with The Urban Plate today?");

      async function sendMessage(text) {
        const input = text.trim();
        if (!input) return;

        addMessage("user", input);
        conversation.push({ role: "user", content: input });
        messageInput.value = "";
        sendButton.disabled = true;
        showTyping();

        try {
          const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile",
              messages: [{ role: "system", content: SYSTEM_PROMPT }, ...conversation],
              temperature: 0.7
            })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error?.message || "Groq API request failed");

          hideTyping();
          const reply = data.choices?.[0]?.message?.content?.trim() || "Sorry, I could not generate a reply.";
          addMessage("assistant", reply);
          conversation.push({ role: "assistant", content: reply });
        } catch (error) {
          hideTyping();
          addMessage("assistant", `Sorry, there was an error: ${error.message}`);
        } finally {
          sendButton.disabled = false;
          messageInput.focus();
        }
      }

      chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          messageInput.value = chip.textContent;
          sendMessage(chip.textContent);
        });
      });

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await sendMessage(messageInput.value);
      });
    </script>
  </body>
</html>
